<!doctype html>
<html lang="zh-CN">
<head><meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" /><title>学生端学习提醒页 · 交互原型</title><style>:root{--text:#152033;--muted:#6e7b91;--primary:#3b6ef5;--primary-2:#5f8bff;--line:#e7edf6}*{box-sizing:border-box}html,body{height:100%}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;background:linear-gradient(180deg,#eef4ff,#f7f9fd 35%,#f4f7fb);color:var(--text)}.stage{min-height:100vh;display:flex;justify-content:center;align-items:center;padding:28px 16px}.phone-frame{width:min(100%,393px);height:852px;max-height:calc(100vh - 36px);background:#111827;border-radius:44px;padding:14px;box-shadow:0 24px 70px rgba(11,18,32,.24), inset 0 0 0 1px rgba(255,255,255,.08);display:flex;flex-direction:column}.phone-top{width:126px;height:22px;background:#111827;border-radius:0 0 18px 18px;margin:0 auto 12px;position:relative;flex:none}.phone-top:before{content:"";position:absolute;left:50%;top:10px;transform:translateX(-50%);width:44px;height:5px;border-radius:999px;background:#2b3445}.phone-screen{background:linear-gradient(180deg,#eef4ff 0%, #f7f9fd 35%, #f4f7fb 100%);border-radius:34px;overflow:hidden;position:relative;flex:1;min-height:0}.app{height:100%;padding:12px 12px 74px;overflow-y:auto;scrollbar-width:none}.app::-webkit-scrollbar{display:none}.topbar{display:flex;justify-content:space-between;align-items:center;padding:6px 2px 14px}.icon-btn{width:38px;height:38px;border:1px solid #dbe4f2;border-radius:12px;background:rgba(255,255,255,.88);display:grid;place-items:center;cursor:pointer;box-shadow:0 8px 20px rgba(23,39,77,.06)}.title{font-size:20px;font-weight:800;margin:6px 0 4px}.sub{font-size:12px;color:var(--muted);line-height:1.6}.notice{background:#fff;border:1px solid var(--line);border-radius:18px;padding:14px;box-shadow:0 12px 30px rgba(23,39,77,.05);margin-top:10px;cursor:pointer}.notice h4{margin:0 0 4px;font-size:15px}.notice p{margin:0;color:var(--muted);font-size:12px;line-height:1.6}.tag{display:inline-block;margin-top:8px;padding:5px 10px;border-radius:999px;font-size:11px;font-weight:700}.blue{background:#eaf1ff;color:#3b6ef5}.green{background:#e8f8f1;color:#18a06a}.orange{background:#fff4df;color:#b97700}.tabbar{position:absolute;left:0;right:0;bottom:0;background:rgba(255,255,255,.96);backdrop-filter:blur(20px);border-top:1px solid #e6edf6;display:flex;justify-content:center;padding:8px 10px 14px;min-height:68px}.tabbar-inner{width:100%;max-width:430px;display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.nav-item{border:none;background:transparent;padding:8px 6px;border-radius:16px;cursor:pointer;color:var(--muted);display:flex;flex-direction:column;align-items:center;gap:4px;font-size:11px}.nav-item.active{color:var(--primary);background:#eef4ff}.toast{position:fixed;left:50%;bottom:92px;transform:translateX(-50%);background:rgba(21,32,51,.92);color:#fff;padding:10px 14px;border-radius:999px;font-size:12px;opacity:0;pointer-events:none;transition:.25s}.toast.show{opacity:1}</style></head>
<body><div class="stage"><div class="phone-frame"><div class="phone-top"></div><div class="phone-screen"><div class="app"><div class="topbar"><button class="icon-btn" id="back">←</button><button class="icon-btn" id="all">☰</button></div><div class="title">学习提醒</div><div class="sub">汇总课程变更、作业截止、系统提醒等重要通知。</div><div class="notice" data-toast="打开提醒：作业截止提醒"><h4>作业截止提醒</h4><p>英语单词拼读作业将于今晚 22:00 截止提交。</p><span class="tag orange">紧急</span></div><div class="notice" data-toast="打开提醒：课程变更通知"><h4>课程变更通知</h4><p>本周四课程时间调整为 19:30，请注意查看课表。</p><span class="tag blue">课程</span></div><div class="notice" data-toast="打开提醒：系统同步完成"><h4>系统同步完成</h4><p>您的学习数据已同步完成，可在首页查看最新进度。</p><span class="tag green">系统</span></div><div class="tabbar"><div class="tabbar-inner"><button class="nav-item" data-nav="home"><div>🏠</div><div>首页</div></button><button class="nav-item" data-nav="course"><div>📚</div><div>课程</div></button><button class="nav-item" data-nav="msg"><div>💬</div><div>消息</div></button><button class="nav-item" data-nav="mine"><div>👤</div><div>个人中心</div></button></div></div><div class="toast" id="toast">已点击</div></div></div></div></div><script>const toast=document.getElementById('toast');let t;function show(s){toast.textContent=s;toast.classList.add('show');clearTimeout(t);t=setTimeout(()=>toast.classList.remove('show'),1500)}back.onclick=()=>show('返回首页');all.onclick=()=>show('全部提醒');document.querySelectorAll('[data-toast]').forEach(el=>el.onclick=()=>show(el.dataset.toast));document.querySelectorAll('.nav-item').forEach(item=>item.onclick=()=>{document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));item.classList.add('active');show('切换到 '+item.innerText.trim())});</script></body>
</html>
