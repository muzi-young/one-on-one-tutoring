<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>学生端课程页 · 交互原型</title>
  <style>
    :root{--bg:#f4f7fb;--panel:#fff;--text:#152033;--muted:#6e7b91;--primary:#3b6ef5;--primary-2:#5f8bff;--line:#e7edf6;--shadow:0 18px 45px rgba(28,56,110,.12)}
    *{box-sizing:border-box} html,body{height:100%} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;background:linear-gradient(180deg,#eef4ff,#f7f9fd 35%,#f4f7fb);color:var(--text)} a{text-decoration:none;color:inherit}
    .stage{min-height:100vh;display:flex;justify-content:center;align-items:center;padding:28px 16px}.phone-frame{width:min(100%,393px);height:852px;max-height:calc(100vh - 36px);background:#111827;border-radius:44px;padding:14px;box-shadow:0 24px 70px rgba(11,18,32,.24), inset 0 0 0 1px rgba(255,255,255,.08);display:flex;flex-direction:column}.phone-top{width:126px;height:22px;background:#111827;border-radius:0 0 18px 18px;margin:0 auto 12px;position:relative;flex:none}.phone-top:before{content:"";position:absolute;left:50%;top:10px;transform:translateX(-50%);width:44px;height:5px;border-radius:999px;background:#2b3445}.phone-screen{background:linear-gradient(180deg,#eef4ff 0%, #f7f9fd 35%, #f4f7fb 100%);border-radius:34px;overflow:hidden;position:relative;flex:1;min-height:0}.app{max-width:393px;margin:0 auto;height:100%;padding:12px 12px 74px;overflow-y:auto;scrollbar-width:none}.app::-webkit-scrollbar{display:none}.topbar{display:flex;justify-content:space-between;align-items:center;padding:6px 2px 14px}.icon-btn{width:38px;height:38px;border:1px solid #dbe4f2;border-radius:12px;background:rgba(255,255,255,.88);display:grid;place-items:center;cursor:pointer;box-shadow:0 8px 20px rgba(23,39,77,.06)}.card{background:rgba(255,255,255,.94);border:1px solid var(--line);border-radius:22px;padding:14px;box-shadow:0 12px 30px rgba(23,39,77,.05)}.banner{background:linear-gradient(135deg,#3b6ef5,#6d93ff);color:#fff;border-radius:24px;padding:16px;box-shadow:0 18px 40px rgba(65,109,246,.24)}.banner h2{margin:0 0 6px;font-size:19px}.sub{color:var(--muted);font-size:12px;line-height:1.6}.section-head{display:flex;justify-content:space-between;align-items:center;margin:14px 0 10px}.section-head h3{margin:0;font-size:15px}.chip-row{display:flex;gap:10px;overflow:auto;scrollbar-width:none}.chip-row::-webkit-scrollbar{display:none}.chip{flex:none;padding:10px 14px;border:1px solid var(--line);background:rgba(255,255,255,.9);border-radius:999px;font-size:12px;cursor:pointer;white-space:nowrap}.chip.active{background:linear-gradient(135deg,var(--primary),var(--primary-2));color:#fff;border-color:transparent}.course-list{display:grid;gap:10px}.course-item{display:flex;gap:12px;align-items:center;padding:12px 14px;border:1px solid var(--line);border-radius:18px;background:#fff;cursor:pointer}.cover{width:64px;height:64px;border-radius:16px;background:linear-gradient(135deg,#e8efff,#b9cbff);display:grid;place-items:center;font-size:24px;flex:none}.meta{flex:1}.meta h4{margin:0 0 4px;font-size:15px}.meta p{margin:0;color:var(--muted);font-size:12px;line-height:1.5}.badge{padding:5px 10px;border-radius:999px;font-size:11px;font-weight:700}.blue{background:#eaf1ff;color:#3b6ef5}.green{background:#e8f8f1;color:#18a06a}.orange{background:#fff4df;color:#b97700}.tabbar{position:absolute;left:0;right:0;bottom:0;background:rgba(255,255,255,.96);backdrop-filter:blur(20px);border-top:1px solid #e6edf6;display:flex;justify-content:center;padding:8px 10px 14px;min-height:68px}.tabbar-inner{width:100%;max-width:430px;display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.nav-item{border:none;background:transparent;padding:8px 6px;border-radius:16px;cursor:pointer;color:var(--muted);display:flex;flex-direction:column;align-items:center;gap:4px;font-size:11px}.nav-item.active{color:var(--primary);background:#eef4ff}.toast{position:fixed;left:50%;bottom:92px;transform:translateX(-50%);background:rgba(21,32,51,.92);color:#fff;padding:10px 14px;border-radius:999px;font-size:12px;opacity:0;pointer-events:none;transition:.25s}.toast.show{opacity:1}
  </style>
</head>
<body>
  <div class="stage"><div class="phone-frame"><div class="phone-top"></div><div class="phone-screen"><div class="app">
    <div class="topbar"><button class="icon-btn" id="back">←</button><button class="icon-btn" id="msg">🔔</button></div>
    <div class="banner"><h2>课程中心</h2><div class="sub">浏览在学课程、筛选推荐课程、查看课程详情与学习状态。</div></div>
    <div class="section-head"><h3>课程筛选</h3><a href="#">重置</a></div>
    <div class="chip-row"><div class="chip active">全部</div><div class="chip">在学</div><div class="chip">已完成</div><div class="chip">待报名</div></div>
    <div class="section-head"><h3>我的课程</h3><a href="#">管理</a></div>
    <div class="course-list">
      <div class="course-item" data-toast="打开课程详情：少儿英语启蒙"><div class="cover">📘</div><div class="meta"><h4>少儿英语启蒙</h4><p>课程进度 68% · 下次课 周四 19:30</p></div><span class="badge blue">学习中</span></div>
      <div class="course-item" data-toast="打开课程详情：儿童数学思维"><div class="cover">➗</div><div class="meta"><h4>儿童数学思维</h4><p>课程进度 32% · 还有 4 节课</p></div><span class="badge green">继续学</span></div>
      <div class="course-item" data-toast="打开课程详情：国学启蒙"><div class="cover">📙</div><div class="meta"><h4>国学启蒙</h4><p>课程进度 100% · 已完成结课</p></div><span class="badge orange">已完成</span></div>
    </div>
    <div class="section-head"><h3>推荐课程</h3><a href="#">更多</a></div>
    <div class="course-list">
      <div class="course-item" data-toast="打开推荐课程：自然拼读"><div class="cover">🔤</div><div class="meta"><h4>自然拼读入门</h4><p>根据当前水平推荐，适合衔接学习</p></div><span class="badge blue">推荐</span></div>
      <div class="course-item" data-toast="打开推荐课程：阅读训练"><div class="cover">📖</div><div class="meta"><h4>少儿阅读训练</h4><p>提升阅读理解与表达能力</p></div><span class="badge green">热门</span></div>
    </div>
    <div class="tabbar"><div class="tabbar-inner"><button class="nav-item" data-nav="home"><div>🏠</div><div>首页</div></button><button class="nav-item active" data-nav="course"><div>📚</div><div>课程</div></button><button class="nav-item" data-nav="msg"><div>💬</div><div>消息</div></button><button class="nav-item" data-nav="mine"><div>👤</div><div>个人中心</div></button></div></div>
    <div class="toast" id="toast">已点击</div>
  </div></div></div></div>
  <script>
    const toast=document.getElementById('toast');let t;function show(s){toast.textContent=s;toast.classList.add('show');clearTimeout(t);t=setTimeout(()=>toast.classList.remove('show'),1500)}
    document.getElementById('back').onclick=()=>show('返回首页');document.getElementById('msg').onclick=()=>show('进入消息中心');
    document.querySelectorAll('[data-toast]').forEach(el=>el.onclick=()=>show(el.dataset.toast));
    document.querySelectorAll('.chip').forEach(c=>c.onclick=()=>{document.querySelectorAll('.chip').forEach(x=>x.classList.remove('active'));c.classList.add('active');show('切换筛选：'+c.textContent)});
    document.querySelectorAll('.nav-item').forEach(item=>item.onclick=()=>{document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));item.classList.add('active');show('切换到 '+item.innerText.trim())});
  </script>
</body>
</html>
