<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>学生端消息页 · 交互原型</title>
  <style>
    :root{--text:#152033;--muted:#6e7b91;--primary:#3b6ef5;--primary-2:#5f8bff;--line:#e7edf6}
    *{box-sizing:border-box} html,body{height:100%} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;background:linear-gradient(180deg,#eef4ff,#f7f9fd 35%,#f4f7fb);color:var(--text)} a{text-decoration:none;color:inherit}
    .stage{min-height:100vh;display:flex;justify-content:center;align-items:center;padding:28px 16px}.phone-frame{width:min(100%,393px);height:852px;max-height:calc(100vh - 36px);background:#111827;border-radius:44px;padding:14px;box-shadow:0 24px 70px rgba(11,18,32,.24), inset 0 0 0 1px rgba(255,255,255,.08);display:flex;flex-direction:column}.phone-top{width:126px;height:22px;background:#111827;border-radius:0 0 18px 18px;margin:0 auto 12px;position:relative;flex:none}.phone-top:before{content:"";position:absolute;left:50%;top:10px;transform:translateX(-50%);width:44px;height:5px;border-radius:999px;background:#2b3445}.phone-screen{background:linear-gradient(180deg,#eef4ff 0%, #f7f9fd 35%, #f4f7fb 100%);border-radius:34px;overflow:hidden;position:relative;flex:1;min-height:0}.app{height:100%;padding:12px 12px 74px;overflow-y:auto;scrollbar-width:none}.app::-webkit-scrollbar{display:none}.topbar{display:flex;justify-content:space-between;align-items:center;padding:6px 2px 14px}.icon-btn{width:38px;height:38px;border:1px solid #dbe4f2;border-radius:12px;background:rgba(255,255,255,.88);display:grid;place-items:center;cursor:pointer;box-shadow:0 8px 20px rgba(23,39,77,.06)}.title{font-size:20px;font-weight:800;margin:6px 0 4px}.sub{font-size:12px;color:var(--muted);line-height:1.6}.tabs{display:flex;gap:10px;margin:14px 0}.tab{padding:10px 14px;border-radius:999px;border:1px solid var(--line);background:#fff;cursor:pointer;font-size:12px}.tab.active{background:linear-gradient(135deg,var(--primary),var(--primary-2));color:#fff;border-color:transparent}.msg-list{display:grid;gap:10px}.msg{background:#fff;border:1px solid var(--line);border-radius:18px;padding:14px;box-shadow:0 12px 30px rgba(23,39,77,.05);cursor:pointer}.msg-top{display:flex;justify-content:space-between;gap:10px}.msg h4{margin:0 0 6px;font-size:15px}.msg p{margin:0;color:var(--muted);font-size:12px;line-height:1.6}.dot{width:8px;height:8px;border-radius:50%;background:#3b6ef5;flex:none;margin-top:6px}.time{font-size:11px;color:var(--muted);white-space:nowrap}.tabbar{position:absolute;left:0;right:0;bottom:0;background:rgba(255,255,255,.96);backdrop-filter:blur(20px);border-top:1px solid #e6edf6;display:flex;justify-content:center;padding:8px 10px 14px;min-height:68px}.tabbar-inner{width:100%;max-width:430px;display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.nav-item{border:none;background:transparent;padding:8px 6px;border-radius:16px;cursor:pointer;color:var(--muted);display:flex;flex-direction:column;align-items:center;gap:4px;font-size:11px}.nav-item.active{color:var(--primary);background:#eef4ff}.toast{position:fixed;left:50%;bottom:92px;transform:translateX(-50%);background:rgba(21,32,51,.92);color:#fff;padding:10px 14px;border-radius:999px;font-size:12px;opacity:0;pointer-events:none;transition:.25s}.toast.show{opacity:1}
  </style>
</head>
<body>
  <div class="stage"><div class="phone-frame"><div class="phone-top"></div><div class="phone-screen"><div class="app">
    <div class="topbar"><button class="icon-btn" id="back">←</button><button class="icon-btn" id="more">⋯</button></div>
    <div class="title">消息中心</div><div class="sub">查看课程通知、老师消息、系统提醒和学习相关更新。</div>
    <div class="tabs"><div class="tab active">全部</div><div class="tab">课程</div><div class="tab">老师</div><div class="tab">系统</div></div>
    <div class="msg-list">
      <div class="msg" data-toast="打开消息：老师新消息"><div class="msg-top"><div style="display:flex;gap:10px"><span class="dot"></span><div><h4>王老师：本周作业已批改</h4><p>请查看作业反馈，及时完成错题订正。</p></div></div><div class="time">10:20</div></div></div>
      <div class="msg" data-toast="打开消息：课程提醒"><div class="msg-top"><div style="display:flex;gap:10px"><span class="dot"></span><div><h4>课程提醒：周四 19:30 开课</h4><p>少儿英语启蒙课程即将开始，请提前进入教室。</p></div></div><div class="time">昨天</div></div></div>
      <div class="msg" data-toast="打开消息：系统通知"><div class="msg-top"><div style="display:flex;gap:10px"><span class="dot"></span><div><h4>系统通知：学习进度已更新</h4><p>本周学习进度已同步，可在首页查看新的推荐内容。</p></div></div><div class="time">周一</div></div></div>
    </div>
    <div class="tabbar"><div class="tabbar-inner"><button class="nav-item" data-nav="home"><div>🏠</div><div>首页</div></button><button class="nav-item" data-nav="course"><div>📚</div><div>课程</div></button><button class="nav-item active" data-nav="msg"><div>💬</div><div>消息</div></button><button class="nav-item" data-nav="mine"><div>👤</div><div>个人中心</div></button></div></div>
    <div class="toast" id="toast">已点击</div>
  </div></div></div></div>
  <script>
    const toast=document.getElementById('toast');let t;function show(s){toast.textContent=s;toast.classList.add('show');clearTimeout(t);t=setTimeout(()=>toast.classList.remove('show'),1500)}
    back.onclick=()=>show('返回首页');more.onclick=()=>show('更多消息操作');document.querySelectorAll('.tab').forEach(x=>x.onclick=()=>{document.querySelectorAll('.tab').forEach(y=>y.classList.remove('active'));x.classList.add('active');show('切换筛选：'+x.textContent)});document.querySelectorAll('[data-toast]').forEach(el=>el.onclick=()=>show(el.dataset.toast));document.querySelectorAll('.nav-item').forEach(item=>item.onclick=()=>{document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));item.classList.add('active');show('切换到 '+item.innerText.trim())});
  </script>
</body>
</html>
