<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HQ Admin — HBOT</title>
  <style>
    :root {
      --bg: #f4f5f7;
      --surface: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --line: #e5e7eb;
      --accent: #4f46e5;
      --accent-soft: #eef2ff;
      --sidebar: #0f172a;
      --sidebar-text: #e2e8f0;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--text); min-height: 100vh; }
    a { color: inherit; }
    .layout { display: flex; min-height: 100vh; }
    aside {
      width: 240px;
      background: var(--sidebar);
      color: var(--sidebar-text);
      padding: 24px 16px;
      flex-shrink: 0;
      overflow-y: auto;
    }
    aside .logo { font-weight: 700; font-size: 0.95rem; margin-bottom: 28px; letter-spacing: -0.02em; }
    aside nav button {
      display: block;
      width: 100%;
      text-align: left;
      padding: 10px 12px;
      margin-bottom: 4px;
      border: 0;
      border-radius: 8px;
      background: transparent;
      color: #94a3b8;
      font-size: 0.875rem;
      cursor: pointer;
    }
    aside nav button:hover { color: #fff; background: rgba(255,255,255,0.06); }
    aside nav button.active { background: rgba(255,255,255,0.1); color: #fff; font-weight: 600; }
    main { flex: 1; padding: 32px 40px 56px; max-width: 1440px; margin: 0 auto; width: 100%; }
    .top {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
    }
    h1 { margin: 0; font-size: 1.35rem; font-weight: 600; }
    .lang {
      display: flex; align-items: center; gap: 12px;
    }
    .lang a { font-size: 0.85rem; color: var(--muted); text-decoration: none; }
    .lang .tog {
      display: flex; background: var(--surface); border: 1px solid var(--line); border-radius: 999px; padding: 3px;
    }
    .lang .tog button {
      border: 0; background: transparent; padding: 6px 12px; border-radius: 999px; font-size: 0.75rem; cursor: pointer; color: var(--muted);
    }
    .lang .tog button.active { background: var(--accent-soft); color: var(--accent); font-weight: 600; }

    .section { display: none; }
    .section.active { display: block; }

    .kpis {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    .kpi {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 18px;
    }
    .kpi .lbl { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
    .kpi .val { font-size: 1.65rem; font-weight: 700; margin-top: 6px; }
    .kpi .delta { font-size: 0.8rem; color: #059669; margin-top: 4px; }

    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 20px;
    }
    .panel h2 { margin: 0 0 16px; font-size: 1rem; font-weight: 600; }
    .map-mock {
      height: 280px;
      background: linear-gradient(135deg, #e0e7ff 0%, #f8fafc 50%, #dbeafe 100%);
      border-radius: 12px;
      border: 1px dashed #c7d2fe;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #4338ca;
      font-size: 0.9rem;
      text-align: center;
      padding: 20px;
    }
    .toolbar { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 14px; }
    select, input, button.btn {
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid var(--line);
      font-size: 0.85rem;
    }
    button.btn { background: var(--surface); cursor: pointer; }
    button.btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 600; }

    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    th, td { text-align: left; padding: 10px 8px; border-bottom: 1px solid var(--line); }
    th { color: var(--muted); font-weight: 500; font-size: 0.75rem; text-transform: uppercase; }
    tr { cursor: pointer; }
    tr:hover { background: #fafafa; }

    .tabs { display: flex; gap: 8px; margin-bottom: 12px; }
    .tabs button {
      padding: 8px 14px;
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.8rem;
    }
    .tabs button.active { border-color: var(--accent); background: var(--accent-soft); color: var(--accent); font-weight: 600; }

    .drawer-back {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.35);
      z-index: 40;
    }
    .drawer-back.show { display: block; }
    .drawer {
      position: fixed;
      top: 0;
      right: 0;
      width: min(420px, 100%);
      height: 100%;
      background: #fff;
      box-shadow: -8px 0 40px rgba(0,0,0,0.08);
      z-index: 41;
      padding: 24px;
      transform: translateX(100%);
      transition: transform 0.2s ease;
    }
    .drawer-back.show .drawer { transform: translateX(0); }

    .modal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 50;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.35);
    }
    .modal.show { display: flex; }
    .modal-box {
      background: #fff;
      border-radius: 14px;
      padding: 24px;
      width: min(400px, 92vw);
    }
    .modal-box h3 { margin: 0 0 12px; }
    .row { display: flex; gap: 8px; margin-top: 16px; }
    .row .btn { flex: 1; }

    .toast {
      position: fixed;
      bottom: 28px;
      right: 28px;
      background: #111827;
      color: #fff;
      padding: 12px 18px;
      border-radius: 10px;
      font-size: 0.85rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
      z-index: 60;
    }
    .toast.show { opacity: 1; }

    .wizard-steps { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .wizard-steps span {
      font-size: 0.7rem;
      padding: 4px 10px;
      border-radius: 999px;
      background: #f3f4f6;
      color: var(--muted);
    }
    .wizard-steps span.done { background: #d1fae5; color: #047857; }
    .wizard-steps span.on { background: var(--accent-soft); color: var(--accent); font-weight: 600; }

    .sparkline {
      height: 56px;
      border-radius: 10px;
      background: linear-gradient(180deg, #eef2ff 0%, #fff 100%);
      border: 1px dashed #c7d2fe;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      color: var(--muted);
      margin-top: 8px;
    }

    .matrix { font-size: 0.78rem; overflow-x: auto; }
    .matrix th, .matrix td { text-align: center; white-space: nowrap; }
    .matrix td.ok { color: #059669; font-weight: 600; }
    .matrix td.no { color: #d1d5db; }

    .drawer h2 { font-size: 1rem; }
    .drawer .d-tabs { display: flex; flex-wrap: wrap; gap: 6px; margin: 12px 0 16px; }
    .drawer .d-tabs button {
      padding: 6px 10px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #fff;
      font-size: 0.72rem;
      cursor: pointer;
    }
    .drawer .d-tabs button.on { border-color: var(--accent); background: var(--accent-soft); color: var(--accent); font-weight: 600; }
    .d-panel { display: none; font-size: 0.85rem; color: var(--muted); }
    .d-panel.on { display: block; }

    .kpi-wrap { position: relative; transition: opacity 0.2s ease; }
    .kpi-wrap.loading { opacity: 0.55; pointer-events: none; }
    .kpi-skel {
      display: none;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    .kpi-wrap.loading + .kpi-skel { display: grid; }
    .kpi-skel .kpi { min-height: 88px; background: linear-gradient(90deg,#f3f4f6 0%,#e5e7eb 50%,#f3f4f6 100%); background-size: 200% 100%; animation: hqsk 1s linear infinite; border: 1px solid var(--line); border-radius: 14px; }
    @keyframes hqsk { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    .timeline { border-left: 2px solid var(--line); margin-left: 8px; padding-left: 16px; }
    .timeline .tl-item { position: relative; padding-bottom: 14px; font-size: 0.85rem; }
    .timeline .tl-item::before {
      content: ""; position: absolute; left: -21px; top: 4px; width: 8px; height: 8px; border-radius: 99px;
      background: var(--accent); border: 2px solid #fff; box-shadow: 0 0 0 1px var(--line);
    }
    .timeline time { font-size: 0.72rem; color: var(--muted); display: block; margin-bottom: 4px; }

    .flag-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--line); font-size: 0.85rem; }
    .flag-row:last-child { border-bottom: 0; }
    input[type="range"].roll { width: 140px; accent-color: var(--accent); }

    .sla { font-size: 0.72rem; color: #b45309; font-variant-numeric: tabular-nums; }
    .bulk-bar { display: none; align-items: center; gap: 10px; padding: 10px 12px; background: var(--accent-soft); border-radius: 10px; margin-bottom: 12px; font-size: 0.85rem; }
    .bulk-bar.show { display: flex; }
    aside nav button:focus-visible, button.btn:focus-visible, select:focus-visible, input:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .fleet-split {
      display: grid;
      grid-template-columns: 1.2fr 0.85fr;
      gap: 24px;
      align-items: start;
    }
    @media (max-width: 1100px) { .fleet-split { grid-template-columns: 1fr; } }
    .fleet-map { min-height: 320px; position: relative; }
    .fleet-caption {
      position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
      margin: 0; font-size: 0.82rem; color: #4338ca; text-align: center; max-width: 90%; z-index: 2; pointer-events: none;
    }
    .fleet-pins {
      position: absolute;
      inset: 16px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      pointer-events: none;
    }
    .fleet-pins span {
      align-self: center; justify-self: center;
      width: 12px; height: 12px; border-radius: 99px;
      box-shadow: 0 0 0 3px #fff, 0 2px 8px rgba(0,0,0,0.12);
    }
    .fleet-pins span.run { background: #059669; }
    .fleet-pins span.idle { background: #94a3b8; }
    .fleet-pins span.off { background: #dc2626; }
    .fleet-legend { display: flex; flex-wrap: wrap; gap: 16px; font-size: 0.8rem; color: var(--muted); margin-bottom: 16px; }
    .fleet-legend i { width: 10px; height: 10px; border-radius: 99px; display: inline-block; margin-right: 6px; vertical-align: middle; }
    .i-run { background: #059669; } .i-idle { background: #94a3b8; } .i-off { background: #dc2626; }

    .tabs-lined .tabs { border-bottom: 1px solid var(--line); padding-bottom: 0; margin-bottom: 16px; }
    .tabs-lined .tabs button { border-radius: 10px 10px 0 0; margin-bottom: -1px; }

    .pill-st {
      font-size: 0.7rem; font-weight: 600; padding: 4px 10px; border-radius: 999px;
      display: inline-block;
    }
    .pill-st.open { background: #fef3c7; color: #92400e; }
    .pill-st.asg { background: #dbeafe; color: #1e40af; }
    .pill-st.res { background: #d1fae5; color: #047857; }

    .policy-editor {
      margin-top: 20px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 18px;
      background: #fafafa;
    }
    .policy-editor textarea {
      width: 100%; min-height: 140px; font-family: ui-monospace, monospace; font-size: 0.82rem;
      border-radius: 10px; border: 1px solid var(--line); padding: 12px;
    }

    .rb-more { font-size: 0.8rem; color: var(--muted); margin-bottom: 12px; }

    .split-h {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    @media (max-width: 960px) { .split-h { grid-template-columns: 1fr; } }
</head>
<body>
  <div class="layout">
    <aside>
      <div class="logo">HBOT HQ</div>
      <nav>
        <button type="button" data-sec="overview" class="active" data-i18n="nav_ov">Overview</button>
        <button type="button" data-sec="fleet" data-i18n="nav_fl">Fleet map</button>
        <button type="button" data-sec="reports" data-i18n="nav_rep">Reports</button>
        <button type="button" data-sec="directory" data-i18n="nav_dir">Directory</button>
        <button type="button" data-sec="onboarding" data-i18n="nav_on">Clinic onboarding</button>
        <button type="button" data-sec="policies" data-i18n="nav_po">Policy templates</button>
        <button type="button" data-sec="audit" data-i18n="nav_au">Audit log</button>
        <button type="button" data-sec="settlement" data-i18n="nav_st">Settlements</button>
        <button type="button" data-sec="integrations" data-i18n="nav_in">Integrations</button>
        <button type="button" data-sec="rbac" data-i18n="nav_rb">Roles & permissions</button>
        <button type="button" data-sec="alerts" data-i18n="nav_al">Alerts</button>
        <button type="button" data-sec="assets" data-i18n="nav_as">Assets</button>
        <button type="button" data-sec="billing" data-i18n="nav_bi">Billing rules</button>
        <button type="button" data-sec="maint" data-i18n="nav_mn">Maintenance</button>
      </nav>
    </aside>
    <main>
      <div class="top">
        <h1 data-i18n="page_title">Global operations</h1>
        <div class="lang">
          <a href="index.html" data-i18n="hub">Hub</a>
          <div class="tog">
            <button type="button" id="le">EN</button>
            <button type="button" id="lz">中文</button>
          </div>
          <span style="font-size:0.75rem;color:var(--muted);" data-i18n="role">Role: Super Admin</span>
        </div>
      </div>

      <section class="section active" id="sec-overview">
        <div class="toolbar" style="margin-bottom:8px;align-items:center;">
          <span style="font-size:0.85rem;color:var(--muted);" data-i18n="exec_lbl">Executive drill-down</span>
          <select id="exec-region" style="min-width:160px;">
            <option value="all" data-i18n="op_all">All regions</option>
            <option value="apac">APAC</option>
            <option value="emea">EMEA</option>
            <option value="amer">Americas</option>
          </select>
        </div>
        <div class="kpi-wrap" id="kpi-wrap">
        <div class="kpis" id="kpis-main">
          <div class="kpi">
            <div class="lbl" data-i18n="kpi_sess">Sessions today</div>
            <div class="val" id="kpi-sess">1,284</div>
            <div class="delta" id="kpi-sess-d" data-i18n="kpi_up">+4.2% vs yesterday</div>
          </div>
          <div class="kpi">
            <div class="lbl" data-i18n="kpi_on">Online devices</div>
            <div class="val" id="kpi-on">612</div>
            <div class="delta" id="kpi-on-d" data-i18n="kpi_stable">Stable</div>
          </div>
          <div class="kpi">
            <div class="lbl" data-i18n="kpi_al">Open alerts</div>
            <div class="val" id="kpi-al">23</div>
            <div class="delta" id="kpi-al-d" data-i18n="kpi_crit">3 critical</div>
          </div>
          <div class="kpi">
            <div class="lbl" data-i18n="kpi_rev">Est. monthly share</div>
            <div class="val" id="kpi-rev">$842k</div>
            <div class="delta" id="kpi-rev-d" data-i18n="kpi_proj">Projection</div>
          </div>
        </div>
        </div>
        <div class="kpi-skel" aria-hidden="true"><div class="kpi"></div><div class="kpi"></div><div class="kpi"></div><div class="kpi"></div></div>
        <button type="button" class="btn btn-primary" id="btn-refresh" data-i18n="btn_ref">Refresh KPIs</button>
        <button type="button" class="btn" id="btn-print-preview" style="margin-left:8px;" data-i18n="btn_print">Printable report…</button>
        <div class="panel" style="margin-top:20px;">
          <h2 data-i18n="ff_title">Feature flags · rollout</h2>
          <div class="flag-row">
            <span data-i18n="ff1">Telemetry batch upload</span>
            <label><span class="meta" id="ff1-pct" style="margin-right:8px;">60%</span><input class="roll" type="range" id="ff1" min="0" max="100" value="60" /></label>
          </div>
          <div class="flag-row">
            <span data-i18n="ff2">New dispute workflow</span>
            <label><span class="meta" id="ff2-pct" style="margin-right:8px;">20%</span><input class="roll" type="range" id="ff2" min="0" max="100" value="20" /></label>
          </div>
        </div>
        <div class="panel">
          <h2 data-i18n="inc_title">Incident timeline (mock)</h2>
          <div class="timeline" id="inc-tl">
            <div class="tl-item"><time>10:40</time><span data-i18n="inc1">Webhook burst · payments degraded</span></div>
            <div class="tl-item"><time>09:55</time><span data-i18n="inc2">Region EMEA · elevated offline rate</span></div>
            <div class="tl-item"><time>Yesterday</time><span data-i18n="inc3">SIM vendor maintenance · resolved</span></div>
          </div>
        </div>
        <div class="panel">
          <h2 data-i18n="map_title">Multi-site device map</h2>
          <div class="map-mock" data-i18n="map_mock">Schematic map placeholder · markers would show running / idle / offline (per Excel).</div>
        </div>
        <div class="panel">
          <h2 data-i18n="dash_title">Device status board</h2>
          <div class="toolbar">
            <select id="flt-region">
              <option data-i18n="op_all">All regions</option>
              <option>APAC</option>
              <option>EMEA</option>
              <option>Americas</option>
            </select>
            <select id="flt-clinic">
              <option data-i18n="op_cl">All clinics</option>
              <option>Clinic North</option>
              <option>Clinic Bay</option>
            </select>
            <button type="button" class="btn" id="btn-filter" data-i18n="btn_apply">Apply filters</button>
          </div>
          <table>
            <thead>
              <tr>
                <th data-i18n="th_dev">Device</th>
                <th data-i18n="th_st">Status</th>
                <th data-i18n="th_last">Last session</th>
              </tr>
            </thead>
            <tbody id="tbl-dash">
              <tr data-id="HBOT-001"><td>HBOT-001</td><td><span style="color:#059669;">Running</span></td><td>14:02</td></tr>
              <tr data-id="HBOT-002"><td>HBOT-002</td><td><span style="color:#6b7280;">Idle</span></td><td>11:40</td></tr>
              <tr data-id="HBOT-003"><td>HBOT-003</td><td><span style="color:#dc2626;">Offline</span></td><td>Yesterday</td></tr>
            </tbody>
          </table>
        </div>
      </section>

      <section class="section" id="sec-fleet">
        <div class="panel">
          <h2 data-i18n="fl_title">Fleet readiness map</h2>
          <p style="color:var(--muted);font-size:0.88rem;margin:-8px 0 18px;" data-i18n="fl_sub">North-star ops canvas · Geo imagery intentionally omitted.</p>
          <div class="fleet-split">
            <div class="map-mock fleet-map">
              <p class="fleet-caption" data-i18n="fl_map">Orthographic fleet canvas · clusters indicate clinic density (demo).</p>
              <div class="fleet-pins" aria-hidden="true">
                <span class="run"></span><span class="idle"></span><span class="off"></span><span class="run"></span>
                <span class="idle"></span><span class="run"></span><span class="idle"></span><span class="off"></span>
                <span class="run"></span><span class="idle"></span><span class="idle"></span><span class="run"></span>
              </div>
            </div>
            <div>
              <div class="fleet-legend">
                <span><i class="i-run"></i><span data-i18n="lg_run">Running</span></span>
                <span><i class="i-idle"></i><span data-i18n="lg_idle">Idle</span></span>
                <span><i class="i-off"></i><span data-i18n="lg_off">Offline</span></span>
              </div>
              <div class="toolbar">
                <select id="fl-region"><option data-i18n="op_all">All regions</option><option>APAC</option><option>EMEA</option><option>Americas</option></select>
                <button type="button" class="btn btn-primary" id="fl-apply" data-i18n="btn_apply">Apply filters</button>
              </div>
              <table>
                <thead><tr><th data-i18n="th_cl">Clinic</th><th data-i18n="th_dev">Devices</th><th data-i18n="fl_col_run">Running</th></tr></thead>
                <tbody>
                  <tr><td>Bay Hyperbaric Center</td><td>12</td><td>7</td></tr>
                  <tr><td>North Wellness</td><td>8</td><td>4</td></tr>
                  <tr><td>Lakeside Rehab</td><td>5</td><td>0</td></tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </section>

      <section class="section" id="sec-reports">
        <div class="panel">
          <h2 data-i18n="rep_title">Reports workspace</h2>
          <p style="color:var(--muted);font-size:0.88rem;margin:-8px 0 16px;" data-i18n="rep_sub">Curated exports · CSV / PDF hand-off to finance.</p>
          <div class="toolbar">
            <select id="rep-preset">
              <option data-i18n="rep_p1">Sessions by clinic · MTD</option>
              <option data-i18n="rep_p2">Alert SLA compliance</option>
              <option data-i18n="rep_p3">Revenue share accrual</option>
            </select>
            <button type="button" class="btn btn-primary" id="btn-rep-open" data-i18n="rep_export">Configure export…</button>
          </div>

    const lg = () => localStorage.getItem("hbot_lang") || "en";
    function apply() {
      const L = T[lg()];
      document.documentElement.lang = lg() === "zh" ? "zh-Hans" : "en";
      document.querySelectorAll("[data-i18n]").forEach((el) => {
        const k = el.getAttribute("data-i18n");
        if (L[k]) el.textContent = L[k];
      });
      document.querySelectorAll("[data-i18n-ph]").forEach((el) => {
        const k = el.getAttribute("data-i18n-ph");
        if (L[k]) el.setAttribute("placeholder", L[k]);
      });
      document.querySelectorAll("#dir-type option[data-i18n], #aud-act option[data-i18n], #exec-region option[data-i18n], #rep-preset option[data-i18n], #aud-actor option[data-i18n]").forEach((op) => {
        const k = op.getAttribute("data-i18n");
        if (L[k]) op.textContent = L[k];
      });
      document.getElementById("le").classList.toggle("active", lg() === "en");
      document.getElementById("lz").classList.toggle("active", lg() === "zh");
    }
    document.getElementById("le").onclick = () => { localStorage.setItem("hbot_lang", "en"); apply(); };
    document.getElementById("lz").onclick = () => { localStorage.setItem("hbot_lang", "zh"); apply(); };

    function toast(k) {
      const t = document.getElementById("toast");
      t.textContent = T[lg()][k];
      t.classList.add("show");
      setTimeout(() => t.classList.remove("show"), 2200);
    }

    document.querySelectorAll("aside nav button").forEach((b) => {
      b.onclick = () => {
        document.querySelectorAll("aside nav button").forEach((x) => x.classList.remove("active"));
        b.classList.add("active");
        const id = b.dataset.sec;
        document.querySelectorAll(".section").forEach((s) => s.classList.toggle("active", s.id === "sec-" + id));
      };
    });

    const EXEC_KPIS = {
      all: { sess: 1284, on: 612, al: 23, rev: "$842k" },
      apac: { sess: 890, on: 420, al: 18, rev: "$510k" },
      emea: { sess: 310, on: 150, al: 9, rev: "$240k" },
      amer: { sess: 180, on: 120, al: 5, rev: "$180k" }
    };
    function applyExecKpi() {
      const v = document.getElementById("exec-region").value;
      const d = EXEC_KPIS[v] || EXEC_KPIS.all;
      document.getElementById("kpi-sess").textContent = d.sess.toLocaleString();
      document.getElementById("kpi-on").textContent = d.on.toLocaleString();
      document.getElementById("kpi-al").textContent = String(d.al);
      document.getElementById("kpi-rev").textContent = d.rev;
    }
    document.getElementById("exec-region").addEventListener("change", applyExecKpi);

    document.getElementById("btn-refresh").onclick = () => {
      const w = document.getElementById("kpi-wrap");
      w.classList.add("loading");
      setTimeout(() => {
        document.getElementById("kpi-sess").textContent = String(1200 + Math.floor(Math.random() * 200));
        document.getElementById("kpi-on").textContent = String(600 + Math.floor(Math.random() * 30));
        document.getElementById("kpi-al").textContent = String(15 + Math.floor(Math.random() * 20));
        w.classList.remove("loading");
        toast("toast_ref");
      }, 700);
    };
    document.getElementById("btn-filter").onclick = () => toast("toast_flt");
    document.getElementById("btn-geo").onclick = () => toast("toast_geo");

    const drawerBack = document.getElementById("drawer-back");
    function openDrawer(devId) {
      document.getElementById("dr-title").textContent = devId;
      document.getElementById("dr-ov-text").textContent = T[lg()].dr_tpl;
      document.querySelectorAll("#dr-tabs button").forEach((x, i) => x.classList.toggle("on", i === 0));
      document.querySelectorAll(".d-panel").forEach((p, i) => p.classList.toggle("on", p.id === "dp-ov"));
      drawerBack.classList.add("show");
    }
    document.getElementById("dr-close").onclick = () => { drawerBack.classList.remove("show"); };
    drawerBack.addEventListener("click", (e) => { if (e.target === drawerBack) drawerBack.classList.remove("show"); });
    document.getElementById("dr-tabs").addEventListener("click", (e) => {
      const b = e.target.closest("button[data-dtab]");
      if (!b) return;
      document.querySelectorAll("#dr-tabs button").forEach((x) => x.classList.remove("on"));
      b.classList.add("on");
      const t = b.dataset.dtab;
      document.querySelectorAll(".d-panel").forEach((p) => p.classList.toggle("on", p.id === "dp-" + t));
    });
    document.querySelectorAll("#tbl-dash tr").forEach((tr) => {
      tr.onclick = () => openDrawer(tr.dataset.id);
    });

    document.getElementById("al-tabs").addEventListener("click", (e) => {
      const b = e.target.closest("button[data-sev]");
      if (!b) return;
      document.querySelectorAll("#al-tabs button").forEach((x) => x.classList.remove("active"));
      b.classList.add("active");
      const sev = b.dataset.sev;
      document.querySelectorAll("#tbl-alerts tr").forEach((row) => {
        const rs = row.dataset.sev;
        row.style.display = sev === "all" || rs === sev ? "" : "none";
      });
    });

    const modalAsg = document.getElementById("modal-asg");
    let asgRow = null;
    document.getElementById("tbl-alerts").addEventListener("click", (e) => {
      const asg = e.target.closest(".al-asg");
      if (asg) {
        asgRow = asg.closest("tr");
        modalAsg.classList.add("show");
        return;
      }
      const res = e.target.closest(".al-res");
      if (!res) return;
      const row = res.closest("tr");
      const pill = row.querySelector(".pill-st");
      const L = T[lg()];
      pill.className = "pill-st res";
      pill.textContent = L.al_w_res;
      res.style.display = "none";
      row.querySelector(".al-asg").style.display = "none";
      const slaCell = row.cells[5];
      if (slaCell) slaCell.innerHTML = '<span style="color:var(--muted);font-size:0.72rem;">—</span>';
      toast("toast_res");
    });
    document.getElementById("asg-cancel").onclick = () => { modalAsg.classList.remove("show"); asgRow = null; };
    document.getElementById("asg-go").onclick = () => {
      if (!asgRow) return;
      const pill = asgRow.querySelector(".pill-st");
      const pick = document.getElementById("asg-to").value;
      const L = T[lg()];
      pill.className = "pill-st asg";
      pill.textContent = L.al_w_asg_prefix + document.getElementById("asg-to").value;
      modalAsg.classList.remove("show");
      toast("toast_asg");
      asgRow = null;
    };
    modalAsg.addEventListener("click", (e) => { if (e.target === modalAsg) modalAsg.classList.remove("show"); });

    const modalRep = document.getElementById("modal-rep");
    document.getElementById("btn-rep-open").onclick = () => modalRep.classList.add("show");
    document.getElementById("rep-cancel").onclick = () => modalRep.classList.remove("show");
    document.getElementById("rep-run").onclick = () => { modalRep.classList.remove("show"); toast("toast_rep_q"); };
    modalRep.addEventListener("click", (e) => { if (e.target === modalRep) modalRep.classList.remove("show"); });

    document.getElementById("fl-apply").onclick = () => toast("toast_flt");

    document.getElementById("set-tabs").addEventListener("click", (e) => {
      const b = e.target.closest("button[data-stab]");
      if (!b) return;
      document.querySelectorAll("#set-tabs button").forEach((x) => x.classList.remove("active"));
      b.classList.add("active");
      const t = b.dataset.stab;
      document.getElementById("set-pane-out").style.display = t === "out" ? "block" : "none";
      document.getElementById("set-pane-inv").style.display = t === "inv" ? "block" : "none";
      document.getElementById("set-pane-adj").style.display = t === "adj" ? "block" : "none";
    });
    document.getElementById("btn-set-csv").onclick = () => toast("toast_csv");

    document.getElementById("aud-apply").onclick = () => {
      const f = document.getElementById("aud-act").value;
      const a = document.getElementById("aud-actor").value;
      const q = document.getElementById("aud-q").value.trim().toLowerCase();
      document.querySelectorAll("#tbl-aud tbody tr").forEach((r) => {
        const actOk = f === "all" || r.getAttribute("data-act") === f;
        const actorOk = a === "all" || r.getAttribute("data-actor") === a;
        const textOk = !q || r.innerText.toLowerCase().includes(q);
        r.style.display = actOk && actorOk && textOk ? "" : "none";
      });
      toast("toast_aud");
    };

    document.querySelectorAll(".pol-edit").forEach((b) => {
      b.onclick = () => document.getElementById("pol-body").focus();
    });
    document.getElementById("pol-diff").onclick = () => toast("toast_diff");
    document.getElementById("pol-save").onclick = () => toast("toast_pol");

    let wizStep = 1;
    function syncWiz() {
      const L = T[lg()];
      for (let i = 1; i <= 4; i++) {
        document.getElementById("wiz-p" + i).style.display = wizStep === i ? "block" : "none";
      }
      document.querySelectorAll("#wiz-steps span").forEach((s) => {
        const n = +s.getAttribute("data-step-i");
        s.classList.toggle("on", n === wizStep);
        s.classList.toggle("done", n < wizStep);
      });
      document.getElementById("wiz-back").style.visibility = wizStep === 1 ? "hidden" : "visible";
      document.getElementById("wiz-next").textContent = wizStep === 4 ? L.wiz_fin : L.wiz_next;
      document.getElementById("wiz-err").style.display = "none";
    }
    syncWiz();
    document.getElementById("wiz-next").onclick = () => {
      if (wizStep === 1) {
        const v = document.getElementById("wiz-name").value.trim();
        if (!v) {
          document.getElementById("wiz-err").style.display = "block";
          return;
        }
      }
      if (wizStep < 4) { wizStep++; syncWiz(); return; }
      toast("toast_wiz");
      wizStep = 1;
      document.getElementById("wiz-name").value = "";
      syncWiz();
    };
    document.getElementById("wiz-back").onclick = () => {
      if (wizStep > 1) { wizStep--; syncWiz(); }
    };

    document.getElementById("btn-dir-search").onclick = () => {
      const q = document.getElementById("dir-q").value.trim().toLowerCase();
      const rows = document.querySelectorAll("#tbl-dir tr");
      let n = 0;
      rows.forEach((r) => {
        const show = !q || r.innerText.toLowerCase().includes(q);
        r.style.display = show ? "" : "none";
        if (show) n++;
      });
      document.querySelector(".empty-dir").style.display = n ? "none" : "block";
      toast("toast_dir");
    };

    document.getElementById("aud-apply").onclick = () => {
      const f = document.getElementById("aud-act").value;
      document.querySelectorAll("#tbl-aud tbody tr").forEach((r) => {
        r.style.display = f === "all" || r.getAttribute("data-act") === f ? "" : "none";
      });
      toast("toast_aud");
    };

    document.querySelectorAll(".pol-dup").forEach((b) => (b.onclick = () => toast("toast_dup")));
    document.getElementById("int-ping").onclick = () => toast("toast_int");

    [["ff1", "ff1-pct"], ["ff2", "ff2-pct"]].forEach(([rid, pid]) => {
      const r = document.getElementById(rid);
      const p = document.getElementById(pid);
      r.addEventListener("input", () => { p.textContent = r.value + "%"; });
    });

    const modalPrint = document.getElementById("modal-print");
    document.getElementById("btn-print-preview").onclick = () => { modalPrint.classList.add("show"); };
    document.getElementById("print-close").onclick = () => modalPrint.classList.remove("show");
    document.getElementById("print-go").onclick = () => { toast("toast_print"); window.print(); };
    modalPrint.addEventListener("click", (e) => { if (e.target === modalPrint) modalPrint.classList.remove("show"); });

    const whBack = document.getElementById("wh-back");
    document.getElementById("btn-wh-log").onclick = () => whBack.classList.add("show");
    document.getElementById("wh-close").onclick = () => whBack.classList.remove("show");
    whBack.addEventListener("click", (e) => { if (e.target === whBack) whBack.classList.remove("show"); });

    function syncDirBulk() {
      const n = document.querySelectorAll(".dir-cb:checked").length;
      document.getElementById("dir-bulk-n").textContent = String(n);
      document.getElementById("dir-bulk").classList.toggle("show", n > 0);
    }
    document.querySelectorAll(".dir-cb").forEach((c) => c.addEventListener("change", syncDirBulk));
    document.getElementById("dir-all").addEventListener("change", (e) => {
      document.querySelectorAll(".dir-cb").forEach((c) => { c.checked = e.target.checked; });
      syncDirBulk();
    });
    document.getElementById("dir-bulk-tag").onclick = () => toast("toast_bulk");

    document.getElementById("btn-csv").onclick = () => document.getElementById("csv-file").click();
    document.getElementById("csv-file").addEventListener("change", () => { toast("toast_csv"); });

    function syncAlBulk() {
      const n = document.querySelectorAll("#tbl-alerts .al-cb:checked").length;
      document.getElementById("al-bulk-ack").style.display = n ? "inline-block" : "none";
    }
    document.querySelectorAll("#tbl-alerts .al-cb").forEach((c) => c.addEventListener("change", syncAlBulk));
    document.getElementById("al-all").addEventListener("change", (e) => {
      document.querySelectorAll("#tbl-alerts .al-cb").forEach((c) => { c.checked = e.target.checked; });
      syncAlBulk();
    });
    document.getElementById("al-bulk-ack").onclick = () => {
      document.querySelectorAll("#tbl-alerts tr").forEach((tr) => {
        if (tr.querySelector(".al-cb:checked")) tr.remove();
      });
      syncAlBulk();
      document.getElementById("al-all").checked = false;
      toast("toast_ack");
    };

    applyExecKpi();
    apply();
  </script>
</body>
</html>
