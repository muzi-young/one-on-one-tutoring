<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>安心陪护 · 平台管理后台原型（PC 端 1920×1080）</title>
<style>
  :root{
    --bg:#f4f7fa; --panel:#ffffff; --ink:#152226; --muted:#6b7a80;
    --line:#e6ecf2; --line-2:#eef2f6;
    --green:#1f8a70; --green-2:#e3f4ee;
    --blue:#2f6fed; --blue-2:#e8f0ff; --blue-3:#1e4ec0;
    --orange:#f59e0b; --orange-2:#fff5e0;
    --red:#e45454; --red-2:#fde7e7;
    --purple:#7c3aed; --purple-2:#ede4ff;
    --shadow:0 2px 8px rgba(31,42,46,.06);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    color:var(--ink);min-height:100vh;
    background:var(--bg);
    font-family:"PingFang SC","Microsoft YaHei",Arial,sans-serif;
    font-size:14px;
  }
  button,input,textarea,select{font:inherit;color:inherit}
  button{cursor:pointer;border:0;background:transparent}
  a{color:inherit;text-decoration:none}
  /* 顶部品牌切换 */
  .topbar{
    position:sticky;top:0;z-index:30;background:#fff;border-bottom:1px solid var(--line);
    padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;
  }
  .topbar .brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:16px;color:var(--blue)}
  .topbar .brand .logo{width:32px;height:32px;background:linear-gradient(135deg,var(--blue),#78a4ff);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px}
  .topbar .nav{display:flex;gap:6px;align-items:center}
  .topbar .nav a{padding:8px 14px;border-radius:99px;font-size:13px;font-weight:600;color:var(--muted)}
  .topbar .nav a.active{background:var(--blue);color:#fff}
  .topbar .right{display:flex;align-items:center;gap:14px;color:var(--muted);font-size:13px}
  .topbar .right .badge{position:relative;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:8px;border:1px solid var(--line);font-size:16px}
  .topbar .right .badge::after{content:"";position:absolute;top:5px;right:5px;width:8px;height:8px;background:var(--red);border-radius:50%;border:2px solid #fff}
  .topbar .right .me{display:flex;align-items:center;gap:8px;padding:4px 10px 4px 4px;border:1px solid var(--line);border-radius:99px}
  .topbar .right .avatar{width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,var(--blue),#78a4ff);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px}

  /* 主体布局 */
  .layout{display:grid;grid-template-columns:230px 1fr;min-height:calc(100vh - 56px)}
  .sidebar{background:#fff;border-right:1px solid var(--line);padding:14px 12px;position:sticky;top:56px;height:calc(100vh - 56px);overflow:auto}
  .sidebar .group{padding:10px 8px 6px;font-size:11px;color:var(--muted);font-weight:700;letter-spacing:.05em;text-transform:uppercase}
  .sidebar a{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;color:var(--ink);font-size:14px;font-weight:500;margin-bottom:2px;transition:.15s ease;cursor:pointer}
  .sidebar a:hover{background:var(--blue-2);color:var(--blue)}
  .sidebar a.active{background:var(--blue);color:#fff;font-weight:700}
  .sidebar a .ico{width:20px;text-align:center;font-size:16px}
  .sidebar a .pill{margin-left:auto;background:var(--red);color:#fff;font-size:11px;padding:2px 8px;border-radius:99px;font-weight:700}
  .sidebar a.active .pill{background:rgba(255,255,255,.25)}

  /* 内容区 */
  .main{padding:20px 28px;overflow-x:hidden}
  .page-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
  .page-head h1{margin:0;font-size:22px;letter-spacing:-.02em}
  .page-head .breadcrumb{font-size:12px;color:var(--muted);margin-top:4px}
  .page-head .actions{display:flex;gap:8px;align-items:center}
  .btn{min-height:36px;padding:0 16px;border-radius:8px;background:var(--blue);color:#fff;font-weight:600;display:inline-flex;align-items:center;gap:6px;font-size:13px;transition:.15s ease}
  .btn:hover{background:var(--blue-3)}
  .btn.secondary{background:#fff;color:var(--ink);border:1px solid var(--line)}
  .btn.secondary:hover{border-color:var(--blue);color:var(--blue);background:#fff}
  .btn.danger{background:var(--red)}
  .btn.danger:hover{background:#c14444}
  .btn.success{background:var(--green)}
  .btn.warn{background:var(--orange)}
  .btn.ghost{background:transparent;color:var(--blue);box-shadow:none}
  .btn.sm{min-height:30px;padding:0 10px;font-size:12px}
  .card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px;box-shadow:var(--shadow);margin-bottom:16px}
  .card .card-title{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
  .card .card-title h3{margin:0;font-size:15px}
  .card .card-title .actions{display:flex;gap:6px;align-items:center}

  /* metric */
  .grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
  .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
  .grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
  .metric{background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px;box-shadow:var(--shadow)}
  .metric .label{color:var(--muted);font-size:12px;display:flex;align-items:center;gap:6px}
  .metric .value{font-size:28px;font-weight:900;margin:8px 0 4px;letter-spacing:-.02em}
  .metric .delta{font-size:12px;display:flex;align-items:center;gap:4px}
  .metric .delta.up{color:var(--green)}
  .metric .delta.down{color:var(--red)}
  .metric .ico{width:36px;height:36px;border-radius:10px;display:inline-flex;align-items:center;justify-content:center;font-size:18px;float:right}
  .metric.blue .ico{background:var(--blue-2);color:var(--blue)}
  .metric.green .ico{background:var(--green-2);color:var(--green)}
  .metric.orange .ico{background:var(--orange-2);color:var(--orange)}
  .metric.purple .ico{background:var(--purple-2);color:var(--purple)}

  /* table */
  .table{width:100%;border-collapse:collapse;font-size:13px}
  .table th,.table td{padding:12px;text-align:left;border-bottom:1px solid var(--line-2)}
  .table th{background:#fafbfd;color:var(--muted);font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.04em}
  .table tr:hover td{background:#fafbfd}
  .table .actions-cell{display:flex;gap:6px;flex-wrap:wrap}
  .pill{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:700}
  .pill.green{background:var(--green-2);color:var(--green)}
  .pill.blue{background:var(--blue-2);color:var(--blue)}
  .pill.orange{background:var(--orange-2);color:var(--orange)}
  .pill.red{background:var(--red-2);color:var(--red)}
  .pill.gray{background:#f1f5f4;color:var(--muted)}
  .pill.purple{background:var(--purple-2);color:var(--purple)}

  /* form */
  .filter-bar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:14px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:10px 14px}
  .filter-bar .field{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--muted)}
  .filter-bar input,.filter-bar select{min-height:32px;border:1px solid var(--line);border-radius:8px;padding:0 10px;background:#fff;outline:none;font-size:13px;min-width:140px}
  .filter-bar input:focus,.filter-bar select:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(47,111,237,.1)}

  /* tabs */
  .tabs{display:flex;gap:6px;border-bottom:1px solid var(--line);margin-bottom:14px;flex-wrap:wrap}
  .tabs button{padding:10px 16px;font-size:13px;color:var(--muted);font-weight:600;border-bottom:2px solid transparent;margin-bottom:-1px}
  .tabs button.active{color:var(--blue);border-color:var(--blue)}

  /* charts (CSS-only) */
  .chart-area{height:240px;position:relative;padding:20px 0 30px;border-bottom:1px solid var(--line-2)}
  .chart-area .grid{position:absolute;inset:20px 0 30px;background:repeating-linear-gradient(0deg,transparent 0,transparent 47px,var(--line-2) 47px,var(--line-2) 48px)}
  .chart-bars{position:relative;display:flex;align-items:flex-end;justify-content:space-around;height:100%;gap:4px;padding:0 20px;z-index:2}
  .chart-bars .bar-group{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1}
  .chart-bars .bars{display:flex;align-items:flex-end;gap:4px;height:100%;width:100%;justify-content:center}
  .chart-bars .bar{width:14px;border-radius:4px 4px 0 0;position:relative;transition:.3s ease}
  .chart-bars .bar:hover{opacity:.85}
  .chart-bars .bar.b1{background:linear-gradient(180deg,var(--blue),#9bb9ff)}
  .chart-bars .bar.b2{background:linear-gradient(180deg,var(--green),#78c4a8)}
  .chart-bars .bar.b3{background:linear-gradient(180deg,var(--orange),#fcd07c)}
  .chart-bars .lbl{font-size:11px;color:var(--muted);position:absolute;bottom:8px}
  .chart-legend{display:flex;gap:14px;justify-content:center;margin-top:8px;font-size:12px;color:var(--muted)}
  .chart-legend .dot{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:4px;vertical-align:middle}
  .donut{position:relative;width:160px;height:160px;border-radius:50%;background:conic-gradient(var(--blue) 0 45%,var(--green) 45% 75%,var(--orange) 75% 100%);display:flex;align-items:center;justify-content:center;margin:0 auto}
  .donut::before{content:"";position:absolute;inset:24px;background:#fff;border-radius:50%}
  .donut .center{position:relative;text-align:center;font-size:13px;color:var(--muted)}
  .donut .center b{font-size:22px;color:var(--ink);display:block}
  .legend-list{margin-top:14px}
  .legend-list .item{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--line-2);font-size:13px}
  .legend-list .item:last-child{border:0}
  .legend-list .dot{display:inline-block;width:8px;height:8px;border-radius:2px;margin-right:6px;vertical-align:middle}

  /* line chart */
  .line-chart{height:240px;position:relative;padding:14px 14px 26px}
  .line-chart svg{width:100%;height:100%}

  /* drawer/modal (PC) */
  .mask{position:fixed;inset:0;background:rgba(14,26,29,.45);opacity:0;pointer-events:none;transition:.2s ease;z-index:80}
  .mask.show{opacity:1;pointer-events:auto}
  .drawer{position:fixed;top:0;right:0;bottom:0;width:480px;background:#fff;box-shadow:-12px 0 40px rgba(0,0,0,.12);z-index:90;transform:translateX(100%);transition:.3s ease;overflow:auto}
  .drawer.show{transform:translateX(0)}
  .drawer .head{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
  .drawer .head h3{margin:0;font-size:16px}
  .drawer .body{padding:18px 22px}
  .drawer .footer{position:sticky;bottom:0;background:#fff;border-top:1px solid var(--line);padding:14px 22px;display:flex;gap:8px;justify-content:flex-end}
  .modal{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:24px;background:rgba(14,26,29,.45);opacity:0;pointer-events:none;transition:.2s ease;z-index:100}
  .modal.show{opacity:1;pointer-events:auto}
  .modal-card{background:#fff;border-radius:14px;padding:26px;width:100%;max-width:440px;box-shadow:0 24px 60px rgba(0,0,0,.3)}
  .toast{position:fixed;top:80px;right:30px;padding:13px 18px;border-radius:10px;background:#0e1a1d;color:#fff;box-shadow:0 16px 32px rgba(0,0,0,.22);transform:translateX(20px);opacity:0;pointer-events:none;transition:.25s ease;font-size:13px;z-index:120}
  .toast.show{transform:translateX(0);opacity:1}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .field{display:flex;flex-direction:column;gap:6px}
  .field label{font-size:12px;color:var(--muted);font-weight:600}
  .field input,.field select,.field textarea{min-height:36px;border:1px solid var(--line);border-radius:8px;padding:6px 10px;outline:none;font-size:13px;background:#fff}
  .field textarea{min-height:80px;resize:vertical}
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(47,111,237,.1)}

  .alert{padding:10px 14px;border-radius:10px;background:var(--orange-2);color:var(--orange);font-size:13px;display:flex;align-items:center;gap:8px;margin-bottom:14px;border:1px solid #fce7b5}
  .map-mock{height:160px;border-radius:14px;background:linear-gradient(135deg,#dde9f3,#f1f5fb);position:relative;overflow:hidden;border:1px solid var(--line);background-image:repeating-linear-gradient(45deg,rgba(47,111,237,.06) 0 2px,transparent 2px 14px),repeating-linear-gradient(-45deg,rgba(47,111,237,.06) 0 2px,transparent 2px 14px);display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:12px}
  .ratio-bar{height:8px;background:var(--line-2);border-radius:99px;overflow:hidden;display:flex}
  .ratio-bar span{height:100%}
  /* heatmap */
  .heatmap{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
  .heatmap .cell{aspect-ratio:1;border-radius:3px;background:var(--line-2)}
  .empty{padding:60px 0;text-align:center;color:var(--muted)}
  .empty .ico{font-size:48px;margin-bottom:8px;opacity:.6}
  @media (max-width:1100px){
    .layout{grid-template-columns:200px 1fr}
    .grid-4{grid-template-columns:repeat(2,1fr)}
    .grid-3{grid-template-columns:repeat(2,1fr)}
  }
</style>
</head>
<body>
<header class="topbar">
  <div class="brand">
    <div class="logo">🛎️</div>
    安心陪护 · 平台管理后台
  </div>
  <nav class="nav">
    <a href="index.html">总览</a>
    <a href="01-用户端小程序原型.html">用户端</a>
    <a href="02-陪诊师端小程序原型.html">陪诊师端</a>
    <a class="active">PC 后台</a>
  </nav>
  <div class="right">
    <span>📍 杭州运营中心</span>
    <button class="badge" onclick="toast('您有 3 条新消息')">🔔</button>
    <div class="me"><div class="avatar">运</div>运营经理 · 周经理</div>
  </div>
</header>

<div class="layout">
  <!-- 侧边导航 -->
  <aside class="sidebar">
    <div class="group">数据 · 概览</div>
    <a id="nav-dashboard" onclick="go('dashboard')"><span class="ico">📊</span>数据概览</a>
    <a id="nav-revenue" onclick="go('revenue')"><span class="ico">💰</span>营收统计</a>

    <div class="group">住宿管理</div>
    <a id="nav-hotels" onclick="go('hotels')"><span class="ico">🏠</span>住宿房源管理</a>
    <a id="nav-hotel-orders" onclick="go('hotel-orders')"><span class="ico">📋</span>住宿订单管理 <span class="pill">5</span></a>

    <div class="group">陪诊管理</div>
    <a id="nav-nurses" onclick="go('nurses')"><span class="ico">👩‍⚕️</span>陪诊师管理 <span class="pill">2</span></a>
    <a id="nav-care-orders" onclick="go('care-orders')"><span class="ico">🩺</span>陪诊订单管理</a>

    <div class="group">系统</div>
    <a onclick="toast('用户管理已规划')"><span class="ico">👤</span>用户管理</a>
    <a onclick="toast('系统设置已规划')"><span class="ico">⚙</span>系统设置</a>
  </aside>

  <!-- 主内容 -->
  <main class="main" id="main"></main>
</div>

<div class="mask" id="mask" onclick="closeAll()"></div>
<div class="drawer" id="drawer"></div>
<div class="modal" id="modal"><div class="modal-card" id="modalCard"></div></div>
<div class="toast" id="toast">操作成功</div>

<script>
const state = { page:'dashboard' };
const $=(id)=>document.getElementById(id);

function toast(t){ const el=$('toast'); el.textContent=t; el.classList.add('show'); clearTimeout(window.__t); window.__t=setTimeout(()=>el.classList.remove('show'),2200); }
function showDrawer(html){ $('drawer').innerHTML=html; $('mask').classList.add('show'); $('drawer').classList.add('show'); }
function closeDrawer(){ $('mask').classList.remove('show'); $('drawer').classList.remove('show'); }
function showModal(html){ $('modalCard').innerHTML=html; $('modal').classList.add('show'); }
function closeModal(){ $('modal').classList.remove('show'); }
function closeAll(){ closeDrawer(); closeModal(); }

function go(page){
  state.page = page;
  document.querySelectorAll('.sidebar a').forEach(a=>a.classList.remove('active'));
  const active = document.getElementById('nav-'+page);
  active && active.classList.add('active');
  closeAll();
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}

const pages = {};

/* ===========================================================
 *  1. 数据概览 dashboard
 * =========================================================== */
pages.dashboard = ()=>`
  <div class="page-head">
    <div>
      <h1>数据概览</h1>
      <div class="breadcrumb">首页 / 数据概览</div>
    </div>
    <div class="actions">
      <select class="btn secondary" onchange="toast('已切换时段')"><option>今日</option><option>近 7 日</option><option>本月</option><option>近 30 日</option></select>
      <button class="btn secondary" onclick="toast('已切换运营中心')">📍 杭州中心</button>
      <button class="btn" onclick="toast('数据已导出 Excel')">📤 导出报表</button>
    </div>
  </div>

  <div class="alert">
    <span>🔔</span>
    <div>有 <b>2 位陪诊师待审核</b>、<b>3 单陪诊待派单</b>、<b>5 单住宿待入住确认</b>，请及时处理 · <a style="color:var(--blue);font-weight:700;cursor:pointer" onclick="go('care-orders')">立即查看</a></div>
  </div>

  <div class="grid-4">
    <div class="metric blue">
      <span class="ico">📋</span>
      <div class="label">今日订单总量</div>
      <div class="value">88</div>
      <div class="delta up">↑ 11.4% vs 昨日</div>
    </div>
    <div class="metric green">
      <span class="ico">💰</span>
      <div class="label">今日营收 (元)</div>
      <div class="value">¥30,664</div>
      <div class="delta up">↑ 16.8% vs 昨日</div>
    </div>
    <div class="metric orange">
      <span class="ico">⏳</span>
      <div class="label">待处理事项</div>
      <div class="value">10</div>
      <div class="delta down">↑ 2 较昨日</div>
    </div>
    <div class="metric purple">
      <span class="ico">👥</span>
      <div class="label">活跃用户</div>
      <div class="value">2,486</div>
      <div class="delta up">↑ 6.3% vs 昨日</div>
    </div>
  </div>

  <div class="grid-2" style="margin-top:16px">
    <div class="card">
      <div class="card-title">
        <h3>📈 近 7 日订单趋势（按业务）</h3>
        <div class="actions">
          <select class="btn secondary sm" onchange="toast('已切换 维度')"><option>按订单量</option><option>按营收</option></select>
        </div>
      </div>
      <div class="chart-area">
        <div class="grid"></div>
        <div class="chart-bars">
          ${[
            ['5/4',38,52],['5/5',45,48],['5/6',52,58],['5/7',48,62],
            ['5/8',56,68],['5/9',62,72],['今日',58,82]
          ].map(([d,a,b])=>`
            <div class="bar-group">
              <div class="bars">
                <div class="bar b1" style="height:${a}%"></div>
                <div class="bar b2" style="height:${b}%"></div>
              </div>
              <span style="font-size:11px;color:var(--muted)">${d}</span>
            </div>
          `).join('')}
        </div>
      </div>
      <div class="chart-legend">
        <span><span class="dot" style="background:var(--blue)"></span>住宿订单</span>
        <span><span class="dot" style="background:var(--green)"></span>陪诊订单</span>
      </div>
    </div>

    <div class="card">
      <div class="card-title">
        <h3>🥧 业务结构占比（本月）</h3>
        <span class="muted" style="font-size:12px">总营收 ¥777,315</span>
      </div>
      <div class="grid-2" style="align-items:center;gap:24px">
        <div class="donut" style="background:conic-gradient(var(--blue) 0 60%,var(--green) 60% 100%)"><div class="center"><b>¥77.7w</b>本月总营收</div></div>
        <div>
          <div class="legend-list">
            <div class="item"><span><span class="dot" style="background:var(--blue)"></span>陪诊服务</span><b>¥466,389 · 60%</b></div>
            <div class="item"><span><span class="dot" style="background:var(--green)"></span>住宿预订</span><b>¥310,926 · 40%</b></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="grid-2" style="margin-top:16px">
    <div class="card">
