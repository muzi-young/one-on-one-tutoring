<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8"/><title>曲谱库 · 古琴智能体</title>
<link rel="stylesheet" href="../assets/shell.css"/></head><body>
<div id="app-shell">
<div class="phone-stage">
  <div class="phone"><div class="phone-screen">
    <div class="status-bar"><span>9:41</span><span>●●●● 📶 🔋</span></div>
    <div style="background:#fff;padding:8px 14px;border-bottom:1px solid #eee;display:flex;align-items:center;gap:10px;">
      <a href="home.html" style="font-size:20px;color:#333;">‹</a>
      <h3 style="margin:0;font-size:16px;">曲谱库</h3>
      <span style="margin-left:auto;font-size:18px;color:#888;">🔍</span>
    </div>
    <div class="app-body">
      <!-- 搜索 -->
      <div style="background:#fff;padding:10px 14px;border-bottom:1px solid #eee;">
        <input type="text" placeholder="🔍 输入曲名 / 流派 / 朝代"/>
      </div>

      <!-- 分类筛选 -->
      <div style="background:#fff;padding:10px 14px;border-bottom:1px solid #eee;display:flex;gap:6px;overflow-x:auto;">
        <button class="btn primary sm">全部 3128</button>
        <button class="btn sm">入门</button>
        <button class="btn sm">名家曲</button>
        <button class="btn sm">古曲</button>
        <button class="btn sm">现代</button>
        <button class="btn sm">收藏</button>
      </div>

      <!-- 推荐 -->
      <div class="section">
        <div class="section-title"><h4 class="ink-title">⭐ 热门曲谱</h4><a>更多</a></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
          <a class="score-card" onclick="openScore('流水')" style="background:#fff;border-radius:12px;overflow:hidden;cursor:pointer;display:block;color:inherit;">
            <div style="height:110px;background:linear-gradient(135deg,#3a2f1e,#7a5a2c);position:relative;display:flex;align-items:center;justify-content:center;color:#fff;font-family:'Songti SC',serif;font-size:30px;">琴
              <span style="position:absolute;top:6px;right:6px;background:rgba(0,0,0,.5);color:#fff;font-size:9px;padding:1px 5px;border-radius:99px;">入门</span>
            </div>
            <div style="padding:10px;">
              <div style="font-size:13px;font-weight:600;">流水</div>
              <div style="font-size:10px;color:#888;margin-top:2px;">伯牙曲 · ♥ 8.2k</div>
            </div>
          </a>
          <a class="score-card" onclick="openScore('广陵散')" style="background:#fff;border-radius:12px;overflow:hidden;cursor:pointer;display:block;color:inherit;">
            <div style="height:110px;background:linear-gradient(135deg,#5b3a18,#a8341e);position:relative;display:flex;align-items:center;justify-content:center;color:#fff;font-family:'Songti SC',serif;font-size:30px;">琴
              <span style="position:absolute;top:6px;right:6px;background:rgba(0,0,0,.5);color:#fff;font-size:9px;padding:1px 5px;border-radius:99px;">进阶</span>
            </div>
            <div style="padding:10px;">
              <div style="font-size:13px;font-weight:600;">广陵散</div>
              <div style="font-size:10px;color:#888;margin-top:2px;">嵇康名曲 · ♥ 6.1k</div>
            </div>
          </a>
          <a class="score-card" onclick="openScore('梅花三弄')" style="background:#fff;border-radius:12px;overflow:hidden;cursor:pointer;display:block;color:inherit;">
            <div style="height:110px;background:linear-gradient(135deg,#f0c2a0,#c5836d);display:flex;align-items:center;justify-content:center;color:#fff;font-family:'Songti SC',serif;font-size:30px;">琴</div>
            <div style="padding:10px;">
              <div style="font-size:13px;font-weight:600;">梅花三弄</div>
              <div style="font-size:10px;color:#888;margin-top:2px;">古琴/古筝 · ♥ 5.4k</div>
            </div>
          </a>
          <a class="score-card" onclick="openScore('阳关三叠')" style="background:#fff;border-radius:12px;overflow:hidden;cursor:pointer;display:block;color:inherit;">
            <div style="height:110px;background:linear-gradient(135deg,#a8c0e0,#5b7ba6);display:flex;align-items:center;justify-content:center;color:#fff;font-family:'Songti SC',serif;font-size:30px;">琴</div>
            <div style="padding:10px;">
              <div style="font-size:13px;font-weight:600;">阳关三叠</div>
              <div style="font-size:10px;color:#888;margin-top:2px;">王维诗 · ♥ 4.8k</div>
            </div>
          </a>
        </div>
      </div>

      <!-- 列表 -->
      <div class="section">
        <h4 class="ink-title" style="margin:0 0 10px;font-size:15px;">全部曲谱</h4>
        <div style="background:#fff;border-radius:10px;overflow:hidden;font-size:13px;">
          <div onclick="openScore('平沙落雁')" style="padding:12px 14px;border-bottom:1px solid #f1ead7;display:flex;justify-content:space-between;align-items:center;cursor:pointer;">
            <div><b>平沙落雁</b><div style="font-size:11px;color:#888;margin-top:2px;">明代古曲 · 减字谱 + 五线谱</div></div>
            <span style="color:#bbb;">›</span>
          </div>
          <div onclick="openScore('忆故人')" style="padding:12px 14px;border-bottom:1px solid #f1ead7;display:flex;justify-content:space-between;align-items:center;cursor:pointer;">
            <div><b>忆故人</b><div style="font-size:11px;color:#888;margin-top:2px;">蔡邕曲 · 中级</div></div>
            <span style="color:#bbb;">›</span>
          </div>
          <div onclick="openScore('潇湘水云')" style="padding:12px 14px;border-bottom:1px solid #f1ead7;display:flex;justify-content:space-between;align-items:center;cursor:pointer;">
            <div><b>潇湘水云</b><div style="font-size:11px;color:#888;margin-top:2px;">郭沔曲 · 高级</div></div>
            <span style="color:#bbb;">›</span>
          </div>
          <div onclick="openScore('酒狂')" style="padding:12px 14px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;">
            <div><b>酒狂</b><div style="font-size:11px;color:#888;margin-top:2px;">阮籍曲 · 入门</div></div>
            <span style="color:#bbb;">›</span>
          </div>
        </div>
      </div>
      <div style="height:90px;"></div>
    </div>
    <div class="tab-bar">
      <a href="home.html"><span class="ic">🏠</span>首页</a>
      <a href="course.html"><span class="ic">🎼</span>课程</a>
      <a href="humming.html"><span class="ic">🎙</span>识曲</a>
      <a href="message.html"><span class="ic">💬</span>消息</a>
      <a href="mine.html"><span class="ic">👤</span>我的</a>
    </div>
  </div></div>
</div>
</div>
<script>
  function openScore(name){
    window.modal('《'+name+'》曲谱', `
      <div style="text-align:center;padding:10px 0 14px;">
        <div style="background:linear-gradient(180deg,#fffaf0,#f7f3e9);border:1px solid #ece4d3;border-radius:8px;padding:18px;font-family:'Songti SC',serif;font-size:14px;line-height:2.4;color:#3a2f1e;letter-spacing:2px;">
          散勾一 · 散挑二<br/>
          注六 · 上九 · 抹七<br/>
          滚拂自二至七<br/>
          泛起 · 七徽九分<br/>
          ……
        </div>
        <div style="display:flex;gap:8px;margin-top:14px;justify-content:center;">
          <button class="btn sm" onclick="window.toast('正在播放示范','success')">▶ 名家示范</button>
          <button class="btn sm" onclick="window.toast('已收藏 ⭐','success')">⭐ 收藏</button>
          <button class="btn sm" onclick="window.toast('下载中...','success')">⬇ 下载</button>
        </div>
      </div>
    `, ()=>window.toast('已加入学习清单','success'));
  }
</script>
<script src="../assets/sidebar.js" data-active="app/score.html" data-crumbs="用户端APP / <b>曲谱库</b>" data-depth="1"></script>
</body></html>
